name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '18'

jobs:
  # Job 1: Testes
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: test123
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Gerar Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://postgres:test123@localhost:5432/testdb

      - name: Rodar Linter
        run: npm run lint

      - name: Rodar Testes
        run: npm run test:coverage
        env:
          DATABASE_URL: postgresql://postgres:test123@localhost:5432/testdb
          JWT_SECRET: test-secret-key

      - name: Upload de coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info
          flags: unittests

  # Job 2: Build e Security Scan
  build-and-scan:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Instalar dependências
        run: npm ci

      - name: Build da aplicação
        run: npm run build

      - name: Scan de segurança (npm audit)
        run: npm audit --production

      - name: Docker Build
        run: |
          docker build -t taskflow-api .
          docker image prune -f

  # Job 3: Deploy (apenas na main)
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-scan
    if: github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v3

      - name: Login no Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build e push da imagem
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/taskflow-api:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/taskflow-api:latest

      - name: Deploy no servidor (SSH)
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /app/taskflow-api
            docker-compose pull
            docker-compose up -d --force-recreate
            docker system prune -f
